<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB TOKEN CHECKER - RAVI KUMAR</title>
    <style>
        body { background: #0f0f0f; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .header { color: #FFD700; font-size: 28px; font-weight: bold; text-shadow: 0 0 10px #FFD700; margin-bottom: 5px; }
        .sub-header { color: #00d2ff; font-size: 14px; margin-bottom: 25px; letter-spacing: 2px; }
        .container { background: #1a1a1a; max-width: 600px; margin: auto; padding: 25px; border-radius: 20px; border: 2px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 150px; background: #000; color: #00ff00; border: 1px solid #444; border-radius: 10px; padding: 15px; box-sizing: border-box; font-family: monospace; }
        button { background: linear-gradient(45deg, #FFD700, #ffae00); color: #000; border: none; padding: 15px 30px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { transform: scale(1.02); box-shadow: 0 0 15px #FFD700; }
        #results { margin-top: 25px; text-align: left; }
        .result-card { background: #252525; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #fff; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .footer { margin-top: 30px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="header">MR. RAVI KUMAR PRAJAPAT</div>
    <div class="sub-header">FACEBOOK TOKEN CHECKER SYSTEM</div>

    <div class="container">
        <textarea id="tokenInput" placeholder="Paste Access Tokens Here (One Per Line)..."></textarea>
        <button onclick="checkTokens()" id="btnText">🔍 START CHECKING</button>
        <div id="results"></div>
    </div>

    <div class="footer">POWERED BY RAVI KUMAR CONVO NONSTOP</div>

    <script>
        async function checkTokens() {
            const input = document.getElementById('tokenInput').value;
            const resDiv = document.getElementById('results');
            const btn = document.getElementById('btnText');
            
            if(!input.trim()) return alert("Please paste some tokens first!");

            resDiv.innerHTML = "<p style='text-align:center;'>Processing Tokens... Please wait ⏳</p>";
            btn.disabled = true;

            try {
                const response = await fetch('/check', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({tokens: input})
                });
                const data = await response.json();
                
                resDiv.innerHTML = "";
                data.forEach(item => {
                    resDiv.innerHTML += `
                        <div class="result-card" style="border-left-color: ${item.color}">
                            <b style="color:${item.color}">${item.status}</b><br>
                            <small style="color:#888">${item.token}</small><br>
                            ${item.name ? `<b>Name:</b> ${item.name}<br>` : ""}
                            ${item.id ? `<b>UID:</b> ${item.id}<br>` : ""}
                            ${item.message ? `<b style="color:#e74c3c">Error:</b> ${item.message}` : ""}
                        </div>`;
                });
            } catch (err) {
                resDiv.innerHTML = "<p style='color:red;'>Server Error! Check Render Logs.</p>";
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
